<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daftar Murid — Belajar 3T</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<nav class="nav"><div class="nav-in">
  <a class="nav-logo" href="guru-dashboard.html"><i class="ti ti-book"></i>Belajar 3T</a>
  <div class="nav-menu">
    <a href="guru-dashboard.html">Dashboard</a>
    <a href="guru-murid.html" class="active">Murid</a>
    <a href="guru-materi.html">Materi</a>
    <a href="guru-soal.html">Soal</a>
  </div>
  <div class="nav-right">
    <span class="conn"><span class="dot"></span>Terhubung</span>
    <div class="avatar" style="background:var(--purple-bg);color:var(--purple)">SR</div>
  </div>
</div></nav>

<div class="container">
  <div class="sec-head" style="margin-bottom:14px"><div class="sec-title" style="font-size:17px">Daftar murid</div></div>

  <div class="toolbar">
    <div class="search"><i class="ti ti-search"></i><input type="text" placeholder="Cari nama murid..." oninput="filterRows(this.value)"></div>
    <select style="width:auto" onchange="filterKelas(this.value)">
      <option value="semua">Semua kelas</option>
      <option value="7">Kelas 7</option>
      <option value="8">Kelas 8</option>
    </select>
  </div>

  <div class="panel" style="padding:6px 16px">
    <table class="tbl">
      <thead><tr><th>Murid</th><th>Kelas</th><th>Terakhir aktif</th><th style="width:160px">Progress</th><th></th></tr></thead>
      <tbody id="tbody">
        <tr class="mrow" data-kelas="8">
          <td><div style="display:flex;align-items:center;gap:10px"><div class="row-av" style="background:var(--teal-bg);color:var(--teal)">DS</div><span class="row-name">Dewi Safitri</span></div></td>
          <td>8</td><td>Hari ini</td>
          <td><div style="display:flex;align-items:center;gap:8px"><div class="row-bar" style="flex:1"><div class="hi" style="width:91%"></div></div><span style="font-size:12px;color:var(--teal);font-weight:500">91%</span></div></td>
          <td><a href="#" style="color:var(--teal-acc);font-size:12px">Detail</a></td>
        </tr>
        <tr class="mrow" data-kelas="8">
          <td><div style="display:flex;align-items:center;gap:10px"><div class="row-av" style="background:var(--blue-bg);color:var(--blue)">AN</div><span class="row-name">Andi Nugroho</span></div></td>
          <td>8</td><td>2 jam lalu</td>
          <td><div style="display:flex;align-items:center;gap:8px"><div class="row-bar" style="flex:1"><div class="md" style="width:76%"></div></div><span style="font-size:12px;color:var(--blue);font-weight:500">76%</span></div></td>
          <td><a href="#" style="color:var(--teal-acc);font-size:12px">Detail</a></td>
        </tr>
        <tr class="mrow" data-kelas="7">
          <td><div style="display:flex;align-items:center;gap:10px"><div class="row-av" style="background:var(--amber-bg);color:var(--amber)">RP</div><span class="row-name">Rizal Pratama</span></div></td>
          <td>7</td><td>Kemarin</td>
          <td><div style="display:flex;align-items:center;gap:8px"><div class="row-bar" style="flex:1"><div class="lo" style="width:43%"></div></div><span style="font-size:12px;color:var(--amber);font-weight:500">43%</span></div></td>
          <td><a href="#" style="color:var(--teal-acc);font-size:12px">Detail</a></td>
        </tr>
        <tr class="mrow" data-kelas="7">
          <td><div style="display:flex;align-items:center;gap:10px"><div class="row-av" style="background:var(--red-bg);color:var(--red)">MH</div><span class="row-name">Maya Halimah</span></div></td>
          <td>7</td><td>5 hari lalu</td>
          <td><div style="display:flex;align-items:center;gap:8px"><div class="row-bar" style="flex:1"><div class="cr" style="width:28%"></div></div><span style="font-size:12px;color:var(--red);font-weight:500">28%</span></div></td>
          <td><a href="#" style="color:var(--teal-acc);font-size:12px">Detail</a></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
function filterRows(q){q=q.toLowerCase();document.querySelectorAll('.mrow').forEach(r=>r.style.display=r.textContent.toLowerCase().includes(q)?'':'none')}
function filterKelas(k){document.querySelectorAll('.mrow').forEach(r=>r.style.display=(k==='semua'||r.dataset.kelas===k)?'':'none')}
</script>
</body>
</html>
