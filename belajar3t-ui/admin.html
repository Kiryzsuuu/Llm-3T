<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Belajar 3T</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<nav class="nav"><div class="nav-in">
  <a class="nav-logo" href="admin.html"><i class="ti ti-book"></i>Belajar 3T</a>
  <div class="nav-menu">
    <a href="admin.html" class="active">Admin</a>
    <a href="admin-users.html">Pengguna</a>
    <a href="admin-edunusa.html">EduNusa</a>
  </div>
  <div class="nav-right">
    <span class="conn"><span class="dot"></span>Terhubung</span>
    <div class="avatar" style="background:var(--purple-bg);color:var(--purple)">AD</div>
  </div>
</div></nav>

<div class="container">
  <div class="hero purple">
    <div class="hero-left">
      <div class="hero-avatar">AD</div>
      <div>
        <div class="hero-hi">Pusat kendali</div>
        <div class="hero-name">Admin · Tim Pusat Belajar 3T</div>
      </div>
    </div>
    <div class="hero-pill">
      <i class="ti ti-building-community" style="color:#CECBF6"></i>
      <span class="hero-num">12</span>
      <span class="hero-lbl">sekolah<br>terhubung</span>
    </div>
  </div>

  <div class="stats four">
    <div class="stat">
      <div class="stat-ico" style="background:var(--teal-bg)"><i class="ti ti-users" style="color:var(--teal)"></i></div>
      <div class="stat-v">842</div><div class="stat-l">Murid</div>
    </div>
    <div class="stat">
      <div class="stat-ico" style="background:var(--blue-bg)"><i class="ti ti-chalkboard" style="color:var(--blue)"></i></div>
      <div class="stat-v">36</div><div class="stat-l">Guru</div>
    </div>
    <div class="stat">
      <div class="stat-ico" style="background:var(--purple-bg)"><i class="ti ti-shield" style="color:var(--purple)"></i></div>
      <div class="stat-v">5</div><div class="stat-l">Admin</div>
    </div>
    <div class="stat">
      <div class="stat-ico" style="background:var(--amber-bg)"><i class="ti ti-books" style="color:var(--amber)"></i></div>
      <div class="stat-v">128</div><div class="stat-l">Materi</div>
    </div>
  </div>

  <div class="sec-head"><div class="sec-title">Kelola</div></div>
  <div class="menu-grid">
    <div class="menu-card" onclick="location.href='admin-users.html'">
      <i class="ti ti-users-group" style="color:var(--teal)"></i>
      <div class="t">Kelola pengguna</div><div class="s">Murid, guru, admin</div>
    </div>
    <div class="menu-card" onclick="location.href='admin-edunusa.html'">
      <i class="ti ti-sparkles" style="color:var(--purple)"></i>
      <div class="t">EduNusa</div><div class="s">Statistik AI Tutor</div>
    </div>
    <div class="menu-card" onclick="location.href='guru-materi.html'">
      <i class="ti ti-books" style="color:var(--amber)"></i>
      <div class="t">Kelola materi</div><div class="s">Konten kurikulum</div>
    </div>
    <div class="menu-card" onclick="location.href='guru-soal.html'">
      <i class="ti ti-list-check" style="color:var(--blue)"></i>
      <div class="t">Kelola soal</div><div class="s">Bank soal latihan</div>
    </div>
  </div>
</div>
</body>
</html>
