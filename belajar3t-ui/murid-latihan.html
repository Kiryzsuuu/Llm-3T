<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Latihan Soal — Belajar 3T</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<nav class="nav"><div class="nav-in">
  <a class="nav-logo" href="murid-dashboard.html"><i class="ti ti-book"></i>Belajar 3T</a>
  <div class="nav-menu">
    <a href="murid-dashboard.html">Beranda</a>
    <a href="murid-materi.html" class="active">Materi</a>
  </div>
  <div class="nav-right">
    <span class="conn"><span class="dot"></span>Terhubung</span>
    <div class="avatar">AN</div>
  </div>
</div></nav>

<div class="container" style="max-width:680px">
  <div id="quiz">
    <div class="q-progress">
      <div class="q-bar"><div id="pbar" style="width:20%"></div></div>
      <div class="q-count" id="pcount">Soal 1 dari 5</div>
    </div>
    <div class="q-card">
      <div style="display:flex;gap:6px;margin-bottom:4px">
        <span class="badge teal">IPA · Kelas 8</span>
        <span class="badge amber" id="level">Sedang</span>
      </div>
      <div class="q-text" id="qtext"></div>
      <div id="opts"></div>
      <div class="explain" id="exp"></div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn ghost" style="flex:1" onclick="prev()">Sebelumnya</button>
      <button class="btn" style="flex:1" id="nextBtn" onclick="next()">Soal berikutnya</button>
    </div>
  </div>

  <div id="result" style="display:none;text-align:center;padding:30px 0">
    <div style="width:80px;height:80px;border-radius:50%;background:var(--teal-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 16px"><i class="ti ti-trophy" style="font-size:36px;color:var(--teal)"></i></div>
    <div style="font-size:15px;color:var(--muted)">Skor kamu</div>
    <div style="font-size:42px;font-weight:500;color:var(--teal)" id="score">80</div>
    <div style="font-size:13px;color:var(--text-2);margin-bottom:22px" id="scoresub">4 dari 5 soal benar</div>
    <div style="display:flex;gap:10px;max-width:360px;margin:0 auto">
      <button class="btn ghost" style="flex:1" onclick="restart()">Ulangi</button>
      <button class="btn" style="flex:1" onclick="location.href='murid-materi-detail.html'">Kembali ke materi</button>
    </div>
  </div>
</div>

<script>
const soal=[
  {q:'Proses masuknya oksigen dari udara ke dalam darah melalui paru-paru disebut...',o:['Ekspirasi','Inspirasi','Difusi','Osmosis'],a:1,e:'Inspirasi adalah proses menghirup udara masuk ke paru-paru. Difusi adalah perpindahan gas di alveolus.',lv:'Mudah'},
  {q:'Organ tempat pertukaran gas O₂ dan CO₂ pada sistem pernapasan manusia adalah...',o:['Trakea','Bronkus','Alveolus','Diafragma'],a:2,e:'Alveolus adalah kantung udara kecil tempat pertukaran oksigen dan karbon dioksida dengan pembuluh darah kapiler.',lv:'Sedang'},
  {q:'Otot yang berperan utama dalam mekanisme pernapasan perut adalah...',o:['Otot dada','Diafragma','Otot leher','Otot perut'],a:1,e:'Diafragma adalah otot berbentuk kubah yang memisahkan rongga dada dan perut, berperan utama dalam pernapasan perut.',lv:'Sedang'},
  {q:'Urutan jalannya udara pernapasan yang benar adalah...',o:['Hidung-laring-faring-trakea','Hidung-faring-laring-trakea','Hidung-trakea-bronkus-faring','Hidung-bronkus-trakea-laring'],a:1,e:'Urutan yang benar: hidung → faring → laring → trakea → bronkus → paru-paru.',lv:'Sulit'},
  {q:'Pada saat ekspirasi, yang terjadi pada diafragma adalah...',o:['Berkontraksi','Relaksasi','Membesar','Menegang'],a:1,e:'Saat ekspirasi, diafragma relaksasi sehingga rongga dada mengecil dan udara terdorong keluar.',lv:'Sedang'},
]
let idx=0,benar=0,answered=[]
const lvColor={Mudah:'teal',Sedang:'amber',Sulit:'red'}

function render(){
  const s=soal[idx]
  document.getElementById('qtext').textContent=s.q
  document.getElementById('pbar').style.width=((idx+1)/soal.length*100)+'%'
  document.getElementById('pcount').textContent=`Soal ${idx+1} dari ${soal.length}`
  const lvl=document.getElementById('level')
  lvl.textContent=s.lv;lvl.className='badge '+lvColor[s.lv]
  const opts=document.getElementById('opts')
  opts.innerHTML=''
  const letters=['A','B','C','D']
  s.o.forEach((opt,i)=>{
    const d=document.createElement('div')
    d.className='opt';d.innerHTML=`<div class="opt-l">${letters[i]}</div>${opt}`
    d.onclick=()=>pick(i,d)
    opts.appendChild(d)
  })
  document.getElementById('exp').style.display='none'
  if(answered[idx]!==undefined)showAnswered()
}
function pick(i,el){
  if(answered[idx]!==undefined)return
  const s=soal[idx]
  answered[idx]=i
  if(i===s.a)benar++
  showAnswered()
}
function showAnswered(){
  const s=soal[idx],chosen=answered[idx]
  const opts=document.querySelectorAll('.opt')
  opts.forEach((o,i)=>{
    if(i===s.a)o.classList.add('right')
    else if(i===chosen)o.classList.add('wrong')
    o.style.pointerEvents='none'
  })
  const exp=document.getElementById('exp')
  exp.style.display='block'
  exp.innerHTML=`<strong>Penjelasan:</strong> ${s.e} — <em>Sumber: IPA Kelas 8, Bab 4</em>`
}
function next(){
  if(idx<soal.length-1){idx++;render()}
  else finish()
}
function prev(){if(idx>0){idx--;render()}}
function finish(){
  document.getElementById('quiz').style.display='none'
  document.getElementById('result').style.display='block'
  const pct=Math.round(benar/soal.length*100)
  document.getElementById('score').textContent=pct
  document.getElementById('scoresub').textContent=`${benar} dari ${soal.length} soal benar`
}
function restart(){idx=0;benar=0;answered=[];document.getElementById('result').style.display='none';document.getElementById('quiz').style.display='block';render()}
render()
</script>
</body>
</html>
