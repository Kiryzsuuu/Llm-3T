<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Masuk — Belajar 3T</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <i class="ti ti-book" style="font-size:30px;color:#1D9E75"></i>
      <span style="font-size:22px;font-weight:500;color:#E1F5EE">Belajar 3T</span>
    </div>
    <div style="font-size:26px;font-weight:500;color:#E1F5EE;line-height:1.35;max-width:340px">Belajar tanpa batas, di mana saja.</div>
    <div style="font-size:13px;color:#9FE1CB;margin-top:12px;max-width:340px">Platform edukasi offline-first untuk daerah Terdepan, Terluar, dan Tertinggal Indonesia.</div>
  </div>
  <div class="login-form">
    <div class="login-card">
      <div style="font-size:18px;font-weight:500;margin-bottom:4px">Selamat datang kembali</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:22px">Masuk untuk melanjutkan belajar</div>
      <div class="field"><label>Email atau NISN</label><input type="text" placeholder="nama@sekolah.id"></div>
      <div class="field"><label>Kata sandi</label><input type="password" placeholder="••••••••"></div>
      <button class="btn big" onclick="location.href='murid-dashboard.html'">Masuk</button>
      <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:14px">Belum punya akun? Hubungi guru atau admin sekolahmu.</div>
    </div>
  </div>
</div>
</body>
</html>
